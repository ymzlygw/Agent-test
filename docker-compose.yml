version: "3.9"

services:
  webhook-agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cursor-webhook-agent
    restart: unless-stopped
    ports:
      - "${PORT:-7860}:7860"
    env_file:
      - .env
    environment:
      - PORT=7860
    volumes:
      # 持久化角色配置和日志，确保容器重启后数据不丢失
      - ./data/roles_config.json:/app/roles_config.json
      - ./data/app.log:/app/app.log
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7860/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  webhook_data:
